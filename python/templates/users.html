
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Table Design</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
        }
        .table-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        .data-table thead {
            background-color: #2c3e50;
            color: #ffffff;
        }
        .data-table th, 
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
        }
        .data-table tbody tr:nth-child(even) {
            background-color: #fcfcfc;
        }
        .data-table tbody tr:hover {
            background-color: #edf2f7;
            transition: background 0.2s;
        }
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge.active { background: #d1fae5; color: #065f46; }
        .badge.inactive { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="table-container">
    <h2>Product Inventory</h2>
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tbody>
                {% for game in games %}
                <tr>
                    <td><strong>{{ game["id"] }}</strong></td>
                    <td>{{ game["title"] }}</td>
                    <td>{{ game["body"] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </tbody>
    </table>
</div>

</body>
</html>
